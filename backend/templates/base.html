<!DOCTYPE html>
<html>

<head>
    <title>AI Interview Platform</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
        }

        .container {
            background: white;
            width: 50%;
            margin: 50px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        a {
            text-decoration: none;
        }

        hr {
            margin: 20px 0;
        }
    </style>

</head>

<body>

    <div class="container">

        {% block content %}
        {% endblock %}

    </div>

</body>

</html>
