<!DOCTYPE html>
<html>

<head>
    <h1 style="text-align:center; color:#007bff;">
        AI Interview Platform
    </h1>
    <style>
        body {
            font-family: Arial;
            background: #f0f2f5;
            margin: 0;
        }

        .container {
            width: 70%;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h1,
        h2 {
            color: #333;
        }

        button {
            padding: 10px 18px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        input {
            padding: 8px;
            width: 60%;
            margin: 5px 0;
        }


        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #007bff;
            color: white;
        }

        th,
        td {
            padding: 12px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        tr:hover {
            background: #e9f5ff;
        }
    </style>
</head>

<body>

    <div class="container">

        {% block content %}
        {% endblock %}

    </div>

</body>

</html>
